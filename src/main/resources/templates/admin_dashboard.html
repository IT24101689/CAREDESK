<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - CareDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Inter', Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1581091870622-df5f2ed3fc35?auto=format&fit=crop&w=1470&q=80') no-repeat center center;
      background-size: cover;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 50px;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(245,245,247,0.35);
      z-index: 0;
    }

    .dashboard-card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.85);
      border-radius: 16px;
      padding: 4rem 4rem;
      box-shadow: 0 24px 40px rgba(0,0,0,0.06);
      backdrop-filter: blur(6px);
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #111827;
      text-align: center;
    }

    .btn {
      border-radius: 9999px;
      font-weight: 600;
      padding: 0.65rem 1.5rem;
      transition: all 0.25s ease;
      margin-bottom: 0.5rem;
    }

    .btn-primary {
      background-color: #111827;
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      background-color: #1f2937;
      transform: translateY(-2px);
    }

    .btn-landing {
      background-color: #111827;
      color: #fff;
      border: none;
      width: 100%;
      border-radius: 9999px;
      padding: 0.65rem 1.5rem;
      font-weight: 600;
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .btn-landing:hover {
      background-color: #1f2937;
      transform: translateY(-2px);
      color: #fff;
    }

    .table-container {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.06);
      overflow: hidden;
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
    }

    .table-wrapper {
      max-height: 400px; /* adjust scrollable height */
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    thead th {
      background-color: rgba(243,244,246,0.8);
      color: #111827;
      font-weight: 600;
      padding: 0.75rem;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody td {
      padding: 0.75rem;
      vertical-align: middle;
    }

    tbody tr:hover {
      background-color: rgba(229,231,235,0.5);
      cursor: pointer;
    }

    .action-btn {
      margin-right: 0.5rem;
      margin-bottom: 0.25rem;
      width: auto;
      padding: 0.45rem 1rem;
      font-size: 0.875rem;
    }

    /* Tab Styling */
    .nav-tabs {
      margin-bottom: 1rem;
    }
    .nav-link {
      color: #111827;
      border: none;
      border-bottom: 2px solid transparent;
    }
    .nav-link.active {
      background: none;
      border-bottom: 2px solid #111827;
      color: #111827;
      font-weight: 600;
    }
    .tab-content {
      padding: 1rem;
    }
  </style>
</head>
<body>

<div class="dashboard-card">
  <h1>Admin Dashboard</h1>

  <!-- Menu Tabs -->
  <ul class="nav nav-tabs" role="tablist">
    <li class="nav-item" role="presentation">
      <a class="nav-link active" id="articles-tab" data-bs-toggle="tab" href="#articles" role="tab" aria-controls="articles" aria-selected="true">Articles</a>
    </li>
    <li class="nav-item" role="presentation">
      <a class="nav-link" id="agents-tab" data-bs-toggle="tab" href="#agents" role="tab" aria-controls="agents" aria-selected="false">Agents</a>
    </li>
  </ul>

  <!-- Tab Content -->
  <div class="tab-content">
    <!-- Articles Tab -->
    <div class="tab-pane fade show active" id="articles" role="tabpanel" aria-labelledby="articles-tab">
      <div class="mb-3 text-center">
        <a href="/admin/articles" class="btn btn-primary me-2">FAQ Articles</a>
        <a href="/admin/categories" class="btn btn-primary">Categories</a>
      </div>

      <!-- Add New Article Button -->
      <a href="/admin/articles/new" class="btn btn-primary mb-3">Add New FAQ Article</a>

      <!-- Articles Table -->
      <div class="table-container">
        <div class="table-wrapper">
          <table class="table mb-0">
            <thead>
            <tr>
              <th>Question</th>
              <th>Category</th>
              <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="article : ${articles}">
              <td th:text="${article.title}"></td>
              <td th:text="${article.category.name}"></td>
              <td>
                <a th:href="@{/admin/articles/edit/{id}(id=${article.id})}" class="btn btn-primary action-btn">Edit</a>
                <a th:href="@{/admin/articles/delete/{id}(id=${article.id})}" class="btn btn-primary action-btn"
                   onclick="return confirm('Are you sure you want to delete this article?');">Delete</a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Agents Tab -->
    <div class="tab-pane fade" id="agents" role="tabpanel" aria-labelledby="agents-tab">
      <!-- Add New Agent Form -->
      <div class="mb-3">
        <h4>Add New Agent</h4>
        <form th:action="@{/api/admin/addAgent}" method="post">
          <div class="row g-2 mb-2">
            <div class="col-md-4">
              <input type="text" class="form-control" name="username" placeholder="Username" required>
            </div>
            <div class="col-md-4">
              <input type="password" class="form-control" name="password" placeholder="Password" required>
            </div>
            <div class="col-md-4">
              <input type="email" class="form-control" name="email" placeholder="Email" required>
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-md-4">
              <input type="text" class="form-control" name="firstName" placeholder="First Name" required>
            </div>
            <div class="col-md-4">
              <input type="text" class="form-control" name="lastName" placeholder="Last Name" required>
            </div>
            <div class="col-md-4">
              <input type="text" class="form-control" name="phoneNumber" placeholder="Phone Number">
            </div>
          </div>
          <button type="submit" class="btn btn-success">Add Agent</button>
        </form>
      </div>

      <!-- Agents Table -->
      <div class="table-container">
        <div class="table-wrapper">
          <table class="table mb-0">
            <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Email</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Phone</th>
              <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="agent : ${agents}">
              <td th:text="${agent.id}"></td>
              <td>
                <input type="text" class="form-control" th:value="${agent.username}" name="username" form="updateForm-${agent.id}">
              </td>
              <td>
                <input type="email" class="form-control" th:value="${agent.email}" name="email" form="updateForm-${agent.id}">
              </td>
              <td>
                <input type="text" class="form-control" th:value="${agent.firstName}" name="firstName" form="updateForm-${agent.id}">
              </td>
              <td>
                <input type="text" class="form-control" th:value="${agent.lastName}" name="lastName" form="updateForm-${agent.id}">
              </td>
              <td>
                <input type="text" class="form-control" th:value="${agent.phoneNumber}" name="phoneNumber" form="updateForm-${agent.id}">
              </td>
              <td>
                <form th:action="@{/api/admin/updateAgent}" method="post" th:id="'updateForm-' + ${agent.id}">
                  <input type="hidden" name="id" th:value="${agent.id}">
                  <button type="submit" class="btn btn-warning action-btn">Update</button>
                </form>
                <form th:action="@{/api/admin/removeAgent/{id}(id=${agent.id})}" method="delete" style="display:inline;">
                  <button type="submit" class="btn btn-danger action-btn" onclick="return confirm('Are you sure you want to delete this agent?');">Remove</button>
                </form>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Logout Button -->
    <a href="/logout" class="btn btn-primary mt-3">Logout</a>
</div>

</body>
</html>
